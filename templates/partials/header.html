<header class="header">
    <nav class="nav">
        <div class="logo">
            <a href="{{ config.base_url | safe }}" class="custom-logo">
                NutD'Blog
            </a>
            <div class="logo-switches">
                <button id="theme-toggle" accesskey="t" title="(Alt + T)">
                    <svg id="moon" xmlns="http://www.w3.org/2000/svg" width="24" height="18" viewBox="0 0 24 24"
                        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                    <svg id="sun" xmlns="http://www.w3.org/2000/svg" width="24" height="18" viewBox="0 0 24 24"
                        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                </button>
            </div>
        </div>

        <ul id="menu">
            {% for nav in config.extra.cela.navigation %}
            <li>
                <a href="{{ nav.path }}" class="nav-link">
                    <span>{{ nav.title }}</span>
                </a>
            </li>
            {% endfor %}
        </ul>
    </nav>
</header>

<style>
/* --- 左上角 Logo 样式与悬停变色 --- */
.custom-logo {
    font-weight: 800 !important;
    font-size: 24px;
    color: var(--primary) !important;
    text-decoration: none !important;
    transition: color 0.3s ease, transform 0.3s ease;
    display: inline-block;
}
.custom-logo:hover {
    color: #6b8a7c !important; /* 悬停变成你喜欢的灰绿色 */
}

/* --- 导航栏下划线样式 --- */
#menu a.nav-link {
    position: relative;
    padding-bottom: 6px; 
    text-decoration: none !important;
    border-bottom: none !important; /* 清除默认的贴字细线 */
}

/* 当前停留栏目的状态（常驻下划线） */
#menu a.active {
    font-weight: 800 !important;
    color: var(--primary) !important;
}
#menu a.active::after {
    content: "";
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 3px;
    background-color: #6b8a7c !important; /* 常驻停留的下划线颜色 */
    border-radius: 2px;
}

/* 其他非当前栏目的鼠标悬停效果（呼吸感） */
#menu a.nav-link:not(.active):hover::after {
    content: "";
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 3px;
    background-color: rgba(107, 138, 124, 0.4) !important; /* 悬停时显示同色系半透明 */
    border-radius: 2px;
    transition: background-color 0.2s ease;
}
</style>

<script>
document.addEventListener("DOMContentLoaded", function() {
    const currentPath = window.location.pathname;
    const menuLinks = document.querySelectorAll('#menu a.nav-link');
    
    menuLinks.forEach(link => {
        link.classList.remove('active');
        let href = link.getAttribute('href');
        
        // 抹平不同环境下的路径斜杠差异
        const pathBase = currentPath.replace(/\/$/, '') || '/';
        const hrefBase = href.replace(/\/$/, '') || '/';

        // 逻辑：如果是首页则精确匹配，如果是 Logs/Notes/Search 等则只要包含该路径就常驻高亮
        if (hrefBase === '/') {
            if (pathBase === '/' || pathBase === '/index.html') {
                link.classList.add('active');
            }
        } else {
            if (pathBase.includes(hrefBase)) {
                link.classList.add('active');
            }
        }
    });
});
</script>
